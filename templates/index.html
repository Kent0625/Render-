<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inventory System</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #161922;
      --surface2: #1e222e;
      --border: #2a2f3d;
      --accent: #6ee7b7;
      --accent2: #818cf8;
      --danger: #f87171;
      --warn: #fbbf24;
      --text: #e2e8f0;
      --muted: #64748b;
      --radius: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ── Header ── */
    header {
      background: rgba(22, 25, 34, 0.8);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.5rem;
      color: var(--accent);
      letter-spacing: -0.5px;
      text-decoration: none;
    }
    .logo span { color: var(--muted); font-weight: 400; }

    /* ── Layout ── */
    .container { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }

    /* ── Stats Row ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      transition: border-color 0.2s, transform 0.2s;
    }
    .stat-card:hover { 
      border-color: var(--accent);
      transform: translateY(-2px);
    }
    .stat-label {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 8px;
    }
    .stat-value {
      font-family: 'Syne', sans-serif;
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--accent);
    }
    .stat-value.purple { color: var(--accent2); }
    .stat-value.red { color: var(--danger); }
    .stat-value.yellow { color: var(--warn); }

    /* ── Main Grid ── */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 24px;
      align-items: start;
    }

    /* ── Panel ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    .panel-header {
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .panel-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.3px;
    }

    /* ── Search & Filter ── */
    .toolbar {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 12px;
      background: var(--surface2);
    }
    .toolbar input, .toolbar select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .toolbar input { flex: 1; }
    .toolbar input:focus, .toolbar select:focus { 
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(110, 231, 183, 0.1);
    }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    thead tr { background: var(--surface2); }
    th {
      padding: 12px 20px;
      text-align: left;
      color: var(--muted);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
      white-space: nowrap;
    }
    tbody tr {
      border-top: 1px solid var(--border);
      transition: background 0.15s;
    }
    tbody tr:hover { background: rgba(255,255,255,0.02); }
    td { padding: 14px 20px; vertical-align: middle; }

    .category-pill {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      background: rgba(129, 140, 248, 0.1);
      color: var(--accent2);
      border: 1px solid rgba(129, 140, 248, 0.2);
      font-weight: 500;
    }
    .qty-badge {
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 6px;
      display: inline-block;
      font-variant-numeric: tabular-nums;
    }
    .qty-ok { background: rgba(110, 231, 183, 0.1); color: var(--accent); }
    .qty-low { background: rgba(251, 191, 36, 0.1); color: var(--warn); }
    .qty-out { background: rgba(248, 113, 113, 0.1); color: var(--danger); }

    .action-btns { display: flex; gap: 8px; }
    .btn-icon {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      cursor: pointer;
      padding: 6px 10px;
      font-size: 0.8rem;
      transition: all 0.2s;
      font-family: inherit;
    }
    .btn-icon:hover, .btn-icon:focus-visible { 
      border-color: var(--accent); 
      color: var(--accent);
      outline: none;
    }
    .btn-icon.del:hover, .btn-icon.del:focus-visible { 
      border-color: var(--danger); 
      color: var(--danger); 
    }

    .empty-state {
      text-align: center;
      padding: 64px 24px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    /* ── Add Form ── */
    .form-body { padding: 24px; display: flex; flex-direction: column; gap: 16px; }
    .form-group label {
      display: block;
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      font-weight: 600;
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: var(--accent);
    }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .btn-primary {
      background: var(--accent);
      color: #0d1117;
      border: none;
      border-radius: 8px;
      padding: 12px 20px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      width: 100%;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:active { transform: scale(0.98); }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 32px;
      right: 32px;
      background: var(--surface);
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 0.9rem;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
      z-index: 999;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.error { border-color: var(--danger); color: var(--danger); }

    /* ── Low Stock Panel ── */
    .alert-list { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .alert-item {
      background: rgba(251, 191, 36, 0.05);
      border: 1px solid rgba(251, 191, 36, 0.1);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.85rem;
    }
    .alert-item .name { color: var(--text); font-weight: 600; margin-bottom: 4px; }
    .alert-item .meta { color: var(--warn); font-size: 0.75rem; font-weight: 500; }

    @media (max-width: 1024px) {
      .main-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 640px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      header { padding: 16px 20px; }
      .container { padding: 24px 16px; }
    }
  </style>
</head>
<body>

<header>
  <a href="/" class="logo" aria-label="Inventory System Dashboard">inv<span>//</span>system</a>
</header>

<div class="container">

  <!-- Stats -->
  <div class="stats-row" id="stats-row">
    <div class="stat-card">
      <div class="stat-label">Total Items</div>
      <div class="stat-value" id="s-total">…</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Stock Value</div>
      <div class="stat-value purple" id="s-value">…</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Categories</div>
      <div class="stat-value" id="s-cats">…</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Low Stock</div>
      <div class="stat-value red" id="s-low">…</div>
    </div>
  </div>

  <div class="main-grid">

    <!-- Left: Table -->
    <section>
      <div class="panel">
        <div class="panel-header">
          <h2 class="panel-title">Inventory Items</h2>
          <span style="font-size:0.75rem; color:var(--muted)" id="item-count"></span>
        </div>
        <div class="toolbar" role="search">
          <input type="text" id="search-input" placeholder="Search items…" aria-label="Search items" oninput="filterItems()"/>
          <select id="cat-filter" aria-label="Filter by category" onchange="filterItems()">
            <option value="">All Categories</option>
          </select>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th><th>Name</th><th>Category</th>
                <th>Qty</th><th>Price</th><th>Actions</th>
              </tr>
            </thead>
            <tbody id="items-tbody"></tbody>
          </table>
        </div>
      </div>
    </section>

    <!-- Right: Add Form + Low Stock -->
    <aside style="display:flex; flex-direction:column; gap:24px;">

      <div class="panel">
        <div class="panel-header"><h2 class="panel-title">Add New Item</h2></div>
        <div class="form-body">
          <div class="form-group">
            <label for="f-name">Item Name</label>
            <input type="text" id="f-name" placeholder="e.g., USB Hub" autocomplete="off"/>
          </div>
          <div class="form-group">
            <label for="f-category">Category</label>
            <input type="text" id="f-category" placeholder="e.g., Electronics" list="category-suggestions" autocomplete="off"/>
            <datalist id="category-suggestions"></datalist>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="f-qty">Quantity</label>
              <input type="number" id="f-qty" placeholder="0" min="0" autocomplete="off"/>
            </div>
            <div class="form-group">
              <label for="f-price">Price (₱)</label>
              <input type="number" id="f-price" placeholder="0.00" step="0.01" min="0" autocomplete="off"/>
            </div>
          </div>
          <div class="form-group">
            <label for="f-desc">Description</label>
            <textarea id="f-desc" placeholder="Optional details…" autocomplete="off"></textarea>
          </div>
          <button class="btn-primary" onclick="addItem()">+ Add Item</button>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header"><h2 class="panel-title">⚠ Low Stock Alerts</h2></div>
        <div class="alert-list" id="alert-list">
          <div class="empty-state">No alerts</div>
        </div>
      </div>

    </aside>
  </div>
</div>

<div id="toast" role="alert" aria-live="polite"></div>

<script>
  const API = '';
  let allItems = [];

  async function fetchItems() {
    try {
      const res = await fetch(`${API}/items`);
      const data = await res.json();
      allItems = data.items;
      renderTable(allItems);
      updateCategoryFilter(allItems);
      document.getElementById('item-count').textContent = `${allItems.length} item(s)`;
    } catch (err) {
      toast('Failed to load items.', true);
    }
  }

  async function fetchSummary() {
    try {
      const res = await fetch(`${API}/summary`);
      const d = await res.json();
      document.getElementById('s-total').textContent = d.total_items;
      document.getElementById('s-value').textContent = '₱' + d.total_stock_value.toLocaleString('en-PH', {minimumFractionDigits: 2});
      document.getElementById('s-cats').textContent = Object.keys(d.categories).length;
      document.getElementById('s-low').textContent = d.low_stock_alerts.length;

      const list = document.getElementById('alert-list');
      if (d.low_stock_alerts.length === 0) {
        list.innerHTML = '<div class="empty-state">No low stock items 🎉</div>';
      } else {
        list.innerHTML = d.low_stock_alerts.map(i => `
          <div class="alert-item">
            <div class="name">${i.name}</div>
            <div class="meta">Only ${i.quantity} left · ${i.category}</div>
          </div>`).join('');
      }
    } catch (err) {
      console.error(err);
    }
  }

  function qtyBadge(q) {
    if (q === 0) return `<span class="qty-badge qty-out">${q}</span>`;
    if (q <= 5) return `<span class="qty-badge qty-low">${q}</span>`;
    return `<span class="qty-badge qty-ok">${q}</span>`;
  }

  function renderTable(items) {
    const tbody = document.getElementById('items-tbody');
    if (items.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state">No items found</div></td></tr>';
      return;
    }
    tbody.innerHTML = items.map(i => `
      <tr>
        <td style="color:var(--muted); font-size:0.75rem; font-variant-numeric: tabular-nums">#${i.id}</td>
        <td style="font-weight:600">${i.name}</td>
        <td><span class="category-pill">${i.category}</span></td>
        <td>${qtyBadge(i.quantity)}</td>
        <td style="color:var(--accent2); font-variant-numeric: tabular-nums">₱${parseFloat(i.price).toLocaleString('en-PH', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
        <td>
          <div class="action-btns">
            <button class="btn-icon" aria-label="Add quantity to ${i.name}" onclick="promptRestock(${i.id}, '${i.name}', ${i.quantity})">+qty</button>
            <button class="btn-icon del" aria-label="Delete ${i.name}" onclick="deleteItem(${i.id}, '${i.name}')">del</button>
          </div>
        </td>
      </tr>`).join('');
  }

  function updateCategoryFilter(items) {
    const cats = [...new Set(items.map(i => i.category))].sort();
    const sel = document.getElementById('cat-filter');
    const datalist = document.getElementById('category-suggestions');
    const current = sel.value;
    
    sel.innerHTML = '<option value="">All Categories</option>' +
      cats.map(c => `<option value="${c}" ${c === current ? 'selected' : ''}>${c}</option>`).join('');
    
    datalist.innerHTML = cats.map(c => `<option value="${c}">`).join('');
  }

  function filterItems() {
    const q = document.getElementById('search-input').value.toLowerCase().trim();
    const cat = document.getElementById('cat-filter').value;
    let filtered = allItems;
    if (q) filtered = filtered.filter(i => i.name.toLowerCase().includes(q));
    if (cat) filtered = filtered.filter(i => i.category === cat);
    renderTable(filtered);
    document.getElementById('item-count').textContent = `${filtered.length} item(s)`;
  }

  async function addItem() {
    const nameBtn = event.target;
    const name = document.getElementById('f-name').value.trim();
    const category = document.getElementById('f-category').value.trim();
    const quantity = parseInt(document.getElementById('f-qty').value);
    const price = parseFloat(document.getElementById('f-price').value);
    const description = document.getElementById('f-desc').value.trim();

    if (!name || !category || isNaN(quantity) || isNaN(price)) {
      toast('Please fill in all required fields.', true);
      return;
    }

    nameBtn.disabled = true;
    nameBtn.textContent = 'Adding…';

    try {
      const res = await fetch(`${API}/items`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, category, quantity, price, description })
      });

      if (res.ok) {
        ['f-name','f-category','f-qty','f-price','f-desc'].forEach(id => document.getElementById(id).value = '');
        toast(`“${name}” added to inventory!`);
        await Promise.all([fetchItems(), fetchSummary()]);
      } else {
        toast('Error adding item.', true);
      }
    } catch (err) {
      toast('Connection error.', true);
    } finally {
      nameBtn.disabled = false;
      nameBtn.textContent = '+ Add Item';
    }
  }

  async function promptRestock(id, name, current) {
    const val = prompt(`Update quantity for “${name}” (current: ${current}):`);
    if (val === null || val === '') return;
    const qty = parseInt(val);
    if (isNaN(qty) || qty < 0) { toast('Invalid quantity.', true); return; }

    try {
      const res = await fetch(`${API}/items/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ quantity: qty })
      });
      if (res.ok) { 
        toast(`Quantity updated to ${qty}!`); 
        await Promise.all([fetchItems(), fetchSummary()]);
      }
    } catch (err) {
      toast('Update failed.', true);
    }
  }

  async function deleteItem(id, name) {
    if (!confirm(`Delete “${name}” from inventory?`)) return;
    try {
      const res = await fetch(`${API}/items/${id}`, { method: 'DELETE' });
      if (res.ok) { 
        toast(`“${name}” removed.`); 
        await Promise.all([fetchItems(), fetchSummary()]);
      }
    } catch (err) {
      toast('Delete failed.', true);
    }
  }

  function toast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = isError ? 'show error' : 'show';
    setTimeout(() => t.className = '', 3000);
  }

  fetchItems();
  fetchSummary();
</script>
</body>
</html>
